function go(id) {
  const url = U[id];
  if (url && url !== "https://") window.open(url, '_blank');
  else toast('⚠️ โต๊ะ ' + id + ' ยังไม่มี URL');
}

let TT;
function toast(m) {
  const e = document.getElementById('tst');
  e.textContent = m; e.className = 'on';
  clearTimeout(TT); TT = setTimeout(() => e.className = '', 3000);
}

const BW = 1060, BH = 650;
function scaleFloor() {
  const o = document.getElementById('flo');
  const f = document.getElementById('fl');
  const ow = o.clientWidth, oh = o.clientHeight;
  const port = window.innerHeight > window.innerWidth;
  let s, tx;
  if (port) {
    s  = Math.min(ow / BH, oh / BW) * 0.97;
    tx = 'rotate(-90deg) scale(' + s + ')';
    f.classList.add('portrait');
  } else {
    s  = Math.min(ow / BW, oh / BH) * 0.97;
    tx = 'scale(' + s + ')';
    f.classList.remove('portrait');
  }
  f.style.left      = ((ow - BW) / 2) + 'px';
  f.style.top       = ((oh - BH) / 2) + 'px';
  f.style.transform = tx;
}
window.addEventListener('resize', scaleFloor);
window.addEventListener('orientationchange', () => setTimeout(scaleFloor, 150));
setTimeout(scaleFloor, 60);
